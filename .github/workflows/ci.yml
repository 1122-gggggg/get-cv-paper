# CI test gate only. Deployment is handled out-of-band on the Oracle Cloud VM
# (git pull + docker compose up -d --build); Fly.io auto-deploy was removed.

name: CI
on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov ruff mypy
      - name: Lint (full ruff ruleset)
        run: ruff check .
      - name: Type check (non-blocking)
        run: mypy . --ignore-missing-imports
        continue-on-error: true
      - name: Lint JS (bug-catcher rules)
        run: npx --yes eslint@9 .
        continue-on-error: true
      - name: Import check
        run: python -c "import main"
      - name: Tests + coverage
        run: pytest -q --cov --cov-report=term-missing --cov-fail-under=55
