# CI test gate only. Deployment is handled out-of-band on the Oracle Cloud VM
# (git pull + docker compose up -d --build); Fly.io auto-deploy was removed.

name: CI
on:
  push:
    branches:
      - main
jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest ruff
      - name: Lint (critical errors only)
        run: ruff check --select=E9,F63,F7,F82 .
      - name: Import check
        run: python -c "import main"
      - name: Tests
        run: pytest -q
