<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Visionary | 電腦視覺最新論文</title>
    <meta name="description" content="A beautiful dashboard for tracking the latest Computer Vision papers.">
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <div class="background-blobs">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
        <div class="blob blob-3"></div>
    </div>

    <div class="container">
        <header>
            <div class="header-content">
                <h1 class="logo">Visionary<span>.</span></h1>
                <p class="subtitle">第一手掌握 Computer Vision 的前沿發展</p>
            </div>
            <div class="controls">
                <div class="search-box">
                    <input type="text" id="searchInput" placeholder="搜尋標題或作者...">
                    <svg class="search-icon" xmlns="http://www.w3.org/2005/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
                </div>
                <select id="sortFilter" class="glass-select">
                    <option value="latest">本日最新 (Latest)</option>
                    <option value="hot_week">本週熱門 (Trending Week)</option>
                    <option value="hot_month">本月熱門 (Trending Month)</option>
                </select>
                <button id="refreshBtn" class="primary-btn">
                    <svg xmlns="http://www.w3.org/2005/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="23 4 23 10 17 10"></polyline><polyline points="1 20 1 14 7 14"></polyline><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"></path></svg>
                    重新整理
                </button>
            </div>
        </header>

        <main>
            <div class="category-filters">
                <button class="category-btn active" data-filter="all">All</button>
                <button class="category-btn" data-filter="top_conf">⭐ 頂會嚴選 (Top Conf)</button>
                <button class="category-btn" data-filter="depth estimation">Depth Estimation</button>
                <button class="category-btn" data-filter="segment">Segmentation</button>
                <button class="category-btn" data-filter="slam">SLAM</button>
                <button class="category-btn" data-filter="object detection">Object Detection</button>
                <button class="category-btn" data-filter="gaussian">Gaussian Splatting</button>
                <button class="category-btn" data-filter="feature match">Feature Match</button>
                <button class="category-btn" data-filter="generation">Generation</button>
                <button class="category-btn" data-filter="transformer">Transformer</button>
                <div class="add-topic-wrapper">
                    <input type="text" id="customTopicInput" placeholder="輸入自訂主題..." />
                    <button id="addTopicBtn" class="add-topic-btn">＋ 新增</button>
                </div>
            </div>

            <div id="loader" class="loader-container">
                <div class="spinner"></div>
                <p>正在自動為您抓取最新論文...</p>
            </div>
            
            <div id="papersGrid" class="papers-grid hidden">
                <!-- Papers injected here via JS -->
            </div>
            <div id="noResults" class="hidden no-results">
                <h2>沒有找到符合搜尋條件的論文。</h2>
            </div>
        </main>
    </div>

    <script src="/static/script.js"></script>
</body>
</html>
