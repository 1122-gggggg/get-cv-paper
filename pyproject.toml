[tool.ruff]
line-length = 200

[tool.ruff.lint]
select = ["E", "F", "W", "B", "C4", "UP"]
ignore = ["E501"]

[tool.ruff.lint.per-file-ignores]
"tests/*" = ["B"]

[tool.coverage.run]
source = ["cache", "clients", "dedup", "disciplines", "event_hub", "main", "oai_harvest", "paper_store", "semantic"]
omit = ["tests/*", ".venv/*"]

[tool.coverage.report]
show_missing = true

[tool.mypy]
ignore_missing_imports = true
